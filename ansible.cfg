# Use this repo as the Ansible project root (so you can run playbooks from here).
# From the repository root:
#   ansible-playbook ansible/site.yml --tags bootstrap --ask-become-pass
[defaults]
inventory = ansible/inventory/hosts.ini
interpreter_python = auto_silent
retry_files_enabled = False
# Project-local collections (see ansible/collections/requirements.yml)
collections_path = ansible/collections:~/.ansible/collections
# Log every playbook run on the control machine (cwd must be repo root for this relative path):
log_path = ansible/ansible.log

[privilege_escalation]
become = true
become_method = sudo
