<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EHF Fellows Directory</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1><a href="#/" class="site-title-link">EHF Fellows Directory</a></h1>
    <div id="search-container" class="header-search">
      <input
        id="search-input"
        class="search-input"
        type="search"
        placeholder="Search by name, tags, cohort…"
        autocomplete="off"
      />
      <p id="search-status" class="search-status" aria-live="polite"></p>
    </div>
    <nav class="site-nav">
      <a href="#/about" class="site-nav-link">About</a>
    </nav>
  </header>
  <div id="connection-banner" class="connection-banner hidden" aria-live="polite"></div>
  <p id="loading">Loading…</p>
  <div id="app-wrap" class="hidden">
    <aside id="directory" aria-label="Fellows list">
      <div id="nl-search-container" class="nl-search-container hidden">
        <label for="nl-search-input" class="search-label">Natural language search (window.ai)</label>
        <textarea
          id="nl-search-input"
          class="search-input"
          rows="2"
          placeholder="e.g. Women investors in the 2019 cohort working on climate tech"
        ></textarea>
        <button id="nl-search-button" class="nl-search-button" type="button">Ask AI</button>
        <p id="nl-search-status" class="search-status" aria-live="polite"></p>
      </div>
      <div id="directory-list"></div>
    </aside>
    <main id="detail" class="detail" aria-label="Fellow detail">
      <p class="placeholder">Select a fellow from the list.</p>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
