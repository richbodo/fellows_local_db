---
- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - curl
      - ufw
      - fail2ban
      - ca-certificates
      - gnupg
      - rsync
    state: present
    update_cache: true

# unattended-upgrades is enabled by default on Ubuntu 24.04 and applies the
# -security pocket nightly, but never reboots — so kernel/libc updates land
# and then strand the box on the old kernel until someone reboots manually.
# Drop-in lives alongside (not inside) the distro-managed 50unattended-upgrades
# so package upgrades won't clobber it. Server is in UTC; 04:00 is the
# quietest window for the EHF audience (NZ 16:00, US PT 21:00 prior day).
- name: Configure unattended-upgrades auto-reboot
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
    content: |
      // Managed by Ansible (roles/common). Do not edit by hand.
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "04:00";

# Service identity: a system account with no login shell and no home, per
# Ubuntu convention for daemons (www-data, postgres, etc.). The account
# exists only to run fellows-pwa and own /opt/fellows.
- name: Ensure service group exists
  ansible.builtin.group:
    name: "{{ service_user }}"
    system: true
    state: present

- name: Ensure service user exists (system, nologin, no home)
  ansible.builtin.user:
    name: "{{ service_user }}"
    group: "{{ service_user }}"
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false
    system: true
    state: present

# Operator joins the service group so rsync writes under /opt/fellows/deploy/
# land with the right group without needing sudo. Paired with the setgid +
# group-writable mode set by the fellows_app role, this avoids the narrow
# "deploy" sudoers pattern we had previously.
- name: Ensure operator ({{ operator_user }}) is a member of {{ service_user }} group
  ansible.builtin.user:
    name: "{{ operator_user }}"
    groups: "{{ service_user }}"
    append: true

# Read-only access to journald without sudo. systemd-journal is the intended
# primitive for ops read access (cannot write, cannot escalate) and is
# narrower than per-command NOPASSWD sudoers. adm is the traditional Debian
# log-reader group and is added defensively so a drift in either group still
# leaves journal reads working. Enables `just prod-stats`, `just prod-stats-long`,
# and plain `journalctl -u fellows-pwa` from a non-sudo SSH session.
- name: Ensure operator ({{ operator_user }}) is a member of journal-read groups
  ansible.builtin.user:
    name: "{{ operator_user }}"
    groups: systemd-journal,adm
    append: true

# Supplementary group membership only takes effect at next login. Force a
# fresh SSH session so subsequent tasks (and later rsync) see the new group.
- name: Reset SSH connection so new group membership takes effect
  ansible.builtin.meta: reset_connection

- name: Configure UFW defaults
  ansible.builtin.command: ufw --force default deny incoming
  changed_when: false

- name: Configure UFW allow outgoing
  ansible.builtin.command: ufw --force default allow outgoing
  changed_when: false

- name: Allow SSH daemon port through UFW
  ansible.builtin.command: "ufw allow from any to any port {{ ssh_listen_port }} proto tcp"
  changed_when: false

- name: Allow HTTP through UFW
  ansible.builtin.command: "ufw allow from any to any port 80 proto tcp"
  changed_when: false

- name: Allow HTTPS through UFW
  ansible.builtin.command: "ufw allow from any to any port 443 proto tcp"
  changed_when: false

- name: Enable UFW
  ansible.builtin.command: ufw --force enable
  changed_when: false

- name: Install SSH hardening override
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-fellows.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart sshd

# Defence-in-depth on the SSH key (the operator key is the highest-value
# credential — it can read fellows.db, the secrets env file, and push the
# bundle to all users). Password auth is already off, so brute force can't
# succeed; fail2ban's job here is to ban scanners/credential-stuffers early
# and keep the auth log clean. backend=systemd because Ubuntu 24.04 has no
# /var/log/auth.log by default — the sshd jail reads the journal. port binds
# the jail to the non-standard SSH port from the inventory.
- name: Configure fail2ban sshd jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (roles/common). Do not edit by hand.
      [DEFAULT]
      backend = systemd
      bantime = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = true
      port = {{ ssh_listen_port }}
  notify: Restart fail2ban

- name: Ensure fail2ban is enabled and started
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
