---
- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Deploy Caddy site config
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy

- name: Ensure globaldonut site root exists (operator-owned for rsync deploys)
  ansible.builtin.file:
    path: "{{ globaldonut_root }}"
    state: directory
    owner: "{{ operator_user }}"
    group: "{{ operator_user }}"
    mode: "0755"

- name: Ensure Caddy is enabled and running
  ansible.builtin.service:
    name: caddy
    state: started
    enabled: true
