---
# Build deploy/dist on the Ansible controller, then sync to the fellows host and restart.
# Requires: Python 3 on the controller, repo layout unchanged (build/build_pwa.py).
#
# From repository root:
#   ansible-playbook ansible/deploy_pwa.yml --ask-become-pass
#
# Skip the build step (reuse existing deploy/dist/):
#   ansible-playbook ansible/deploy_pwa.yml --extra-vars "fellows_skip_build=true" --ask-become-pass
#
# Skip HTTPS smoke (no outbound curl/requests to production):
#   ansible-playbook ansible/deploy_pwa.yml --extra-vars "fellows_smoke=false" --ask-become-pass
#
# Override smoke URL:
#   ansible-playbook ansible/deploy_pwa.yml --extra-vars "fellows_smoke_url=https://staging.example.com" --ask-become-pass

- name: Build PWA bundle on controller
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    repo_root: "{{ playbook_dir | dirname }}"
  tasks:
    - name: Run build/build_pwa.py
      ansible.builtin.command:
        cmd: python3 build/build_pwa.py
        chdir: "{{ repo_root }}"
      register: _build
      changed_when: "'Wrote' in (_build.stdout | default(''))"
      when: not (fellows_skip_build | default(false) | bool)

    # Verify that deploy/dist/manifest.sig exists and is newer than
    # manifest.json. If the operator forgot to run `just sign` between
    # build and deploy, fail loudly here rather than rsync an unsigned
    # bundle that the SW will refuse to install. The signing step
    # itself happens outside ansible (interactive passphrase prompt
    # doesn't compose well with the command module); the justfile
    # chains build → sign → deploy-fast so this check is normally a
    # no-op trip-wire, never the active failure mode.
    - name: Verify bundle manifest is signed
      ansible.builtin.stat:
        path: "{{ repo_root }}/deploy/dist/manifest.sig"
      register: _manifest_sig
      when: not (fellows_skip_sign | default(false) | bool)
    - name: Fail if manifest.sig is missing
      ansible.builtin.fail:
        msg: >-
          deploy/dist/manifest.sig is missing. Run `just sign` after
          `just build`, then re-run deploy. (Or pass
          --extra-vars fellows_skip_sign=true to deploy an unsigned
          bundle for testing.)
      when:
        - not (fellows_skip_sign | default(false) | bool)
        - not (_manifest_sig.stat.exists | default(false))

- name: Deploy to fellows host
  hosts: fellows
  gather_facts: true
  roles:
    - fellows_app

- name: Smoke test production HTTPS (controller)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    # Do not set fellows_smoke_url from fellows_smoke_url — that self-reference recurses in Jinja2.
    # Extra-var fellows_smoke_url (optional) is read here into a distinct name.
    fellows_smoke_base_url: "{{ fellows_smoke_url | default('https://fellows.globaldonut.com') }}"
  tasks:
    - name: GET /healthz
      ansible.builtin.uri:
        url: "{{ fellows_smoke_base_url | trim('/') }}/healthz"
        method: GET
        status_code: 200
        return_content: true
      register: _healthz
      when: fellows_smoke | default(true) | bool

    - name: GET /manifest.webmanifest (JSON)
      ansible.builtin.uri:
        url: "{{ fellows_smoke_base_url | trim('/') }}/manifest.webmanifest"
        method: GET
        status_code: 200
      when: fellows_smoke | default(true) | bool

    - name: Report healthz body
      ansible.builtin.debug:
        msg: "{{ _healthz.content | default('') }}"
      when:
        - fellows_smoke | default(true) | bool
        - _healthz is defined
